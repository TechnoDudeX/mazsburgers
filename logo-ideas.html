<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maz's Burgers — Logo Ideas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #1a1a1a;
    color: #f4eada;
    min-height: 100vh;
    padding: 60px 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 60px;
  }

  .logos {
    display: flex;
    flex-direction: column;
    gap: 80px;
    max-width: 700px;
    margin: 0 auto;
  }

  .logo-card {
    background: #242424;
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    border: 1px solid #333;
  }

  .logo-card .label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #D42C2C;
    margin-bottom: 30px;
    font-weight: 600;
  }

  /* Logo 1: Stacked Bold */
  .logo-1 .mark {
    font-family: 'Lilita One', cursive;
    line-height: 0.9;
  }
  .logo-1 .mark .top {
    display: block;
    font-size: 3.5rem;
    letter-spacing: 0.05em;
  }
  .logo-1 .mark .bottom {
    display: block;
    font-size: 5rem;
    letter-spacing: 0.02em;
    color: #D42C2C;
  }

  /* Logo 2: Single Line with Divider */
  .logo-2 .mark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 2.8rem;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .logo-2 .mark .divider {
    color: #D42C2C;
    font-weight: 500;
  }

  /* Logo 3: Retro Diner */
  .logo-3 .mark {
    line-height: 1.4;
  }
  .logo-3 .mark .top {
    display: block;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2.4rem;
    color: #E8B53A;
    font-weight: 700;
  }
  .logo-3 .mark .bottom {
    display: block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: 0.35em;
    margin-top: 5px;
  }

  /* Dark/light variants */
  .variants {
    display: flex;
    gap: 20px;
    margin-top: 30px;
    justify-content: center;
  }
  .variant {
    padding: 20px 30px;
    border-radius: 8px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #666;
  }
  .variant.on-light {
    background: #f4eada;
    color: #161414;
  }
</style>
</head>
<body>

<h1>Maz's Burgers — Text Logo Concepts</h1>

<div class="logos">

  <!-- Logo 1 -->
  <div class="logo-card logo-1">
    <div class="label">Option 1 — Stacked Bold</div>
    <div class="mark">
      <span class="top">MAZ'S</span>
      <span class="bottom">BURGERS</span>
    </div>
  </div>

  <!-- Logo 2 -->
  <div class="logo-card logo-2">
    <div class="label">Option 2 — Single Line with Divider</div>
    <div class="mark">
      <span>MAZ'S</span>
      <span class="divider">//</span>
      <span>BURGERS</span>
    </div>
  </div>

  <!-- Logo 3 -->
  <div class="logo-card logo-3">
    <div class="label">Option 3 — Retro Diner</div>
    <div class="mark">
      <span class="top">~maz's~</span>
      <span class="bottom">BURGERS</span>
    </div>
  </div>

</div>

</body>
</html>
